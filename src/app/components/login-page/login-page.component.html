<div class="auth-card">

    <div class="auth-header">

        <div class="auth-icon">

            🔐

        </div>

        <h1>

            Welcome Back

        </h1>

        <p class="subtitle">

            Sign in to continue reading and publishing articles.

        </p>

    </div>

    <form
        (ngSubmit)="onSubmit()"
        #f="ngForm">

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                [(ngModel)]="form.username"
                placeholder="Enter your username"
                required>

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                [(ngModel)]="form.password"
                placeholder="Enter your password"
                required>

        </div>

        <button
            type="submit"
            [disabled]="!f.valid">

            Sign In

        </button>

    </form>

    <div class="auth-footer">

        Don't have an account?

        <a routerLink="/register">

            Create one

        </a>

    </div>

</div>
