<div class="auth-card">

    <div class="auth-header">

        <div class="auth-icon">

            ✨

        </div>

        <h1>

            Create Your Account

        </h1>

        <p class="subtitle">

            Join our growing community of writers and readers.

        </p>

    </div>

    <form
        (ngSubmit)="onSubmit()"
        #f="ngForm">

        <div class="form-group">

            <label>First Name</label>

            <input
                type="text"
                name="firstName"
                [(ngModel)]="form.firstName"
                placeholder="John"
                required>

        </div>

        <div class="form-group">

            <label>Last Name</label>

            <input
                type="text"
                name="lastName"
                [(ngModel)]="form.lastName"
                placeholder="Doe"
                required>

        </div>

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                [(ngModel)]="form.username"
                placeholder="Choose a username"
                required>

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                [(ngModel)]="form.password"
                placeholder="Create a secure password"
                required>

        </div>

        <button
            type="submit"
            [disabled]="!f.valid">

            Create Account

        </button>

    </form>

    <div class="auth-footer">

        Already have an account?

        <a routerLink="/login">

            Sign In

        </a>

    </div>

</div>
